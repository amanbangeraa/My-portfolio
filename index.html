<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Bangera</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Modern Glassmorphism Navigation -->
    <nav class="modern-nav" id="modernNav">
        <div class="nav-container">
            <!-- Left side navigation icons -->
            <div class="nav-left">
                <a href="#home" class="nav-link active" title="Home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                </a>
                <a href="#about" class="nav-link" title="About">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                    </svg>
                </a>
                <a href="#work" class="nav-link" title="Work">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,6V4H10V6H4V18H20V6M12,7A3,3 0 0,1 15,10A3,3 0 0,1 12,13A3,3 0 0,1 9,10A3,3 0 0,1 12,7Z"/>
                    </svg>
                </a>
            </div>
            
            <!-- Centered logo -->
            <div class="nav-brand">
                <img src="aman.jpg" alt="Aman Bangera" class="brand-img">
            </div>
            
            <!-- Right side navigation icons -->
            <div class="nav-right">
                <a href="#experience" class="nav-link" title="Experience">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </a>
                <a href="#contact" class="nav-link" title="Contact">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </a>
                <a href="#menu" class="nav-link" title="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content-modern">
        <!-- Hero Section -->
        <section id="home" class="hero-section">
            <div class="hero-background">
                <div class="stars-container">
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                </div>
                <div class="abstract-shape">
                    <div class="geometric-crystal">
                        <div class="crystal-face face-1"></div>
                        <div class="crystal-face face-2"></div>
                        <div class="crystal-face face-3"></div>
                        <div class="crystal-face face-4"></div>
                        <div class="crystal-face face-5"></div>
                        <div class="crystal-face face-6"></div>
                        <div class="crystal-glow"></div>
                    </div>
                </div>
            </div>
            <div class="hero-container">
                <div class="hero-content">
                    <div class="hero-text">
                        <h1 class="hero-title">
                            <span class="name-text">
                                <span class="first-name">AMAN</span>
                                <span class="last-name">BANGERA</span>
                            </span>
                        </h1>
                        <button class="cta-button primary">
                            <span>EXPLORE WORK</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Other sections will be added here -->
        <section id="about" class="section">
            <div class="container">
                <h2>About Section</h2>
                <p>Content coming soon...</p>
            </div>
        </section>

        <section id="work" class="section">
            <div class="container">
                <h2>Work Section</h2>
                <p>Content coming soon...</p>
            </div>
        </section>

        <section id="experience" class="section">
            <div class="container">
                <h2>Experience Section</h2>
                <p>Content coming soon...</p>
            </div>
        </section>

        <section id="contact" class="section">
            <div class="container">
                <h2>Contact Section</h2>
                <p>Content coming soon...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
