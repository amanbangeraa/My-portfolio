<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #2c2c2c;
            overflow: hidden;
        }
        
        .hero-background {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: none;
        }
        
        .star {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        
        .star:hover {
            background: #ff6b35;
            transform: scale(2);
            box-shadow: 0 0 20px #ff6b35;
        }
        
        .blob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            cursor: pointer;
        }
        
        .blob:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        .debug {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="debug" id="debug">Mouse: (0, 0)</div>
    <div class="hero-background" id="hero">
        <div class="star" style="top: 20%; left: 20%;"></div>
        <div class="star" style="top: 30%; left: 70%;"></div>
        <div class="star" style="top: 60%; left: 30%;"></div>
        <div class="star" style="top: 80%; left: 80%;"></div>
        <div class="blob" id="blob"></div>
    </div>

    <script>
        const hero = document.getElementById('hero');
        const stars = document.querySelectorAll('.star');
        const blob = document.getElementById('blob');
        const debug = document.getElementById('debug');
        
        console.log('Elements found:', { hero: !!hero, stars: stars.length, blob: !!blob });
        
        hero.addEventListener('mousemove', function(e) {
            const rect = hero.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const mouseX = e.clientX - rect.left - centerX;
            const mouseY = e.clientY - rect.top - centerY;
            
            debug.textContent = `Mouse: (${mouseX.toFixed(0)}, ${mouseY.toFixed(0)})`;
            
            // Move stars
            stars.forEach((star, index) => {
                const speed = (index + 1) * 0.1;
                const x = mouseX * speed;
                const y = mouseY * speed;
                star.style.transform = `translate(${x}px, ${y}px)`;
            });
            
            // Move blob
            const blobSpeed = 0.05;
            const x = mouseX * blobSpeed;
            const y = mouseY * blobSpeed;
            blob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
        
        hero.addEventListener('mouseleave', function() {
            stars.forEach(star => {
                star.style.transform = 'translate(0, 0)';
            });
            blob.style.transform = 'translate(-50%, -50%)';
            debug.textContent = 'Mouse: Out of bounds';
        });
    </script>
</body>
</html>
